<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics of Java Script</title>
    <style>
        .box {
            height: 90px;
            width: 90px;
            background-color: lightgreen;
            border-radius: 5px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="box">
        <h3>Box1</h3>
    </div>
    <script>
        alert("Hello World");
        console.log("Hello Bro!");
        console.log("Tarun Ghadoria");
        console.log("Code is looking like a wow.");
        age = 24;
        console.log(age);
        console.log("3+4");
        console.log(3+4);
        sum = 20.5 + 20.5;
        console.log(sum);
        name = ("Tarun Ghadoria");
        console.log(name);
        var a = prompt("Enter Your Number");
        console.log("Your Number is :- " + a);
        var isTrue = confirm("Are you sure you want to leave this page?")
        if (isTrue) {
            console.log("Leaving this page...")
        }
        else {
            console.log("You can't leave this at this point.")
        }
    </script>
</body>

</html>
